<!DOCTYPE html>
<html>
<head>
    <title>GuidrGo AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🌍 GuidrGo AI</h1>

    <p>AI Powered Travel Recommendation System</p>

    <!-- City Search -->

    <input
    type="text"
    id="city"
    placeholder="Enter City">

    <button onclick="searchCity()">
        Search
    </button>

    <!-- Travel Results -->

    <div id="result"></div>

    <hr>

    <!-- Travel Score -->

    <h2>🏆 Travel Score</h2>
    <div id="score"></div>

    <hr>

    <!-- Reviews -->

    <h2>⭐ Hotel Review Analysis</h2>
    <div id="reviews"></div>

    <hr>

    <!-- NEW SMART HOTEL RECOMMENDATION -->

    <h2>🏨 Smart Hotel Recommendation</h2>

    <p>
        Tell us what matters most to you:
        food, view, luxury, family, staff, comfort
    </p>

    <input
    type="text"
    id="hotelPreference"
    placeholder="Example: good food">

    <button onclick="recommendHotel()">
        Recommend Hotel
    </button>

    <div id="hotelRecommendation"></div>

    <hr>

    <!-- Trip Planner -->

    <h2>🗺 AI Trip Planner</h2>
    <div id="trip"></div>

    <hr>

    <!-- NLP Section -->

    <h2>🧠 NLP Sentiment Analysis</h2>

    <input
    type="text"
    id="sentimentText"
    placeholder="Example: I love visiting Skardu">

    <button onclick="checkSentiment()">
        Analyze
    </button>

    <div id="sentimentResult"></div>

</div>

<script src="script.js"></script>

</body>
</html>
